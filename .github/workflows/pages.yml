# Builds and deploys the rendered docs site to GitHub Pages.
#
# Source: docs/*.md + runbooks/*.md (the same source render-docs uses
# for the in-plugin help page). On every push to main, this workflow
# regenerates the HTML and publishes to https://<owner>.github.io/<repo>/.
#
# Deployment target is the github-pages environment. First run will
# auto-create that environment if the repo's Pages source is set to
# "GitHub Actions" (Settings -> Pages -> Source).
#
# Why publish docs to Pages when they're already in the plugin bundle?
# Pages gives a stable public URL for newcomers to browse the docs +
# runbook library without needing a Mattermost install — useful for
# evaluation, linking from external docs, and search-engine discovery.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # One in-flight Pages deploy at a time; queue new pushes but don't
  # cancel the running one (otherwise a rapid sequence of merges could
  # leave the site in an intermediate state).
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Render docs site
        run: make render-docs

      # Composite a landing page at the Pages root that links to both
      # the docs site and the runbook library. Without this index.html
      # at /, visitors hit the empty Pages root.
      - name: Create root landing page
        run: |
          cat > public/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Mattermost Alertmanager Plugin</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; color: #1a1a1a; }
              h1 { font-size: 1.75rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 1rem 0; }
              a { color: #1f6feb; text-decoration: none; font-weight: 500; }
              a:hover { text-decoration: underline; }
              .desc { color: #555; margin-top: 0.25rem; font-size: 0.95rem; }
              .src { color: #888; font-size: 0.85rem; }
            </style>
          </head>
          <body>
            <h1>Mattermost Alertmanager Plugin</h1>
            <p>Bridges Prometheus Alertmanager into Mattermost — alerts post into channel with the matching SRE runbook's diagnostic commands inline.</p>
            <ul>
              <li>
                <a href="help/home.html">Plugin documentation</a>
                <div class="desc">Setup, slash commands, configuration, rotation, deployment.</div>
              </li>
              <li>
                <a href="runbooks/home.html">SRE Runbook library</a>
                <div class="desc">20+ runbooks for common Prometheus alerts, embedded in the plugin.</div>
              </li>
            </ul>
            <p class="src">Source: <a href="https://github.com/christopherfickess/mattermost-plugin-alertmanager">GitHub</a></p>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
