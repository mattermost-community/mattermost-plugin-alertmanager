# Runs `go test ./...` on every push to main and every pull request.
# Acts as the primary regression gate — any contributor change that
# breaks the configuration parser, the AM-URL dedup logic, or any of
# the runbook/template helpers will fail this check before merge.
#
# Go version is pinned to the toolchain declared in go.mod. setup-go
# honors the go-version-file field, so a future Go bump in go.mod
# propagates to CI automatically without editing this workflow.
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 ./...
