# Runs `go test ./...` on every push to main and every pull request.
# Acts as the primary regression gate — any contributor change that
# breaks the configuration parser, the AM-URL dedup logic, or any of
# the runbook/template helpers will fail this check before merge.
#
# Go version is pinned to the toolchain declared in go.mod. setup-go
# honors the go-version-file field, so a future Go bump in go.mod
# propagates to CI automatically without editing this workflow.
name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 ./...

  # Validates the shipped sample rules (samples/prometheus-rules.yaml) with
  # promtool. Users copy this file into their own Prometheus, so a broken
  # PromQL expr or malformed YAML must never merge. promtool ships inside the
  # prom/prometheus image (its entrypoint is /bin/prometheus, hence the
  # --entrypoint override); the tag is pinned to match the version the
  # deploy-local verify-rules.sh gate uses.
  validate-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: promtool check rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "${{ github.workspace }}/samples":/w -w /w \
            prom/prometheus:v3.5.0 \
            check rules /w/prometheus-rules.yaml
