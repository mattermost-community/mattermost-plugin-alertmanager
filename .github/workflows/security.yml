# Runs the SBOM + Grype scan and CodeQL static analysis on every PR
# and every push to main. Uploads SARIF results to GitHub code scanning
# so findings show up inline on PRs and in the Security tab.
#
# Build is gated:
#   - Grype: --fail-on high blocks HIGH/CRITICAL CVEs
#   - CodeQL: make security-gate fails on error-level SARIF findings
#   - SARIF upload to Code Scanning: required, no bypass
#
# REQUIREMENT: GitHub Code Scanning must be enabled on the repo.
#   - Public repos: free, enable via Settings -> Code security and analysis
#   - Private repos: requires GitHub Advanced Security (paid, Enterprise plan)
# Without it, the SARIF upload step will fail and the workflow will go red.
# That is intentional — security findings must reach the Security tab so
# reviewers can see them inline on the PR.
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run weekly to catch newly-disclosed CVEs even when no code changes.
    # GHSA / NVD update continuously; we'd otherwise only notice on the
    # next PR, which may be weeks away for a stable plugin.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write  # upload SARIF to code scanning
  actions: read

jobs:
  sbom-scan:
    name: SBOM + Grype vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: dist/sbom/
          retention-days: 30

      # Run Grype directly (rather than via make) so we can emit SARIF
      # for GitHub code scanning. `make sbom-scan` emits table output
      # only — useful for humans, not for the code scanning API.
      - name: Scan SBOM with Grype (SARIF output)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v6.7.0
        id: grype-scan
        with:
          sbom: dist/sbom/server-sbom.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      # Upload is required, not best-effort. If Code Scanning isn't
      # enabled on this repo, the step fails and the workflow goes red
      # — by design. Enable Code Scanning in repo settings (public:
      # free; private: needs GHAS).
      - name: Upload Grype SARIF to code scanning
        if: always() && steps.grype-scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.0
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype

      - name: Upload Grype SARIF as workflow artifact
        if: always() && steps.grype-scan.outputs.sarif != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sarif
          path: ${{ steps.grype-scan.outputs.sarif }}
          retention-days: 30

  codeql:
    name: CodeQL static analysis (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.0
        with:
          languages: go
          # Index from repo root so root-package files (main.go,
          # docs_embed.go, runbooks_embed.go) are covered. The Go
          # module is rooted at the repo root — server/ is just a
          # package inside it, not a separate module.

      - name: Autobuild
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.0

      # Split analysis from upload so each step's success/failure has
      # one clear meaning. `upload: never` writes SARIF locally; the
      # explicit security-gate step then enforces the finding threshold,
      # and the upload step pushes results to GitHub Code Scanning.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.0
        id: codeql-analyze
        with:
          category: codeql-go
          upload: never
          output: codeql-results

      # Stage the SARIF where `make security-gate` looks for it
      # (dist/codeql-*.sarif). The Make target parses the SARIF
      # for level=error findings and fails CI if any are present.
      # Same gate as `make release` runs locally.
      - name: Run security gate (fail on critical/high findings)
        run: |
          mkdir -p dist
          cp codeql-results/*.sarif dist/codeql-go.sarif
          make security-gate

      # Required: must reach the Security tab. No continue-on-error.
      # If this fails, enable Code Scanning per the workflow header.
      - name: Upload CodeQL SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.0
        with:
          sarif_file: codeql-results
          category: codeql-go

      - name: Upload CodeQL SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 30
