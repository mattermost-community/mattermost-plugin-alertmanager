# Runs the SBOM + Grype scan and CodeQL static analysis on every PR
# and every push to main. Uploads SARIF results to GitHub code scanning
# so findings show up inline on PRs and in the Security tab.
#
# Build is gated on `make security-gate` for CodeQL and on
# `--fail-on high` for Grype — HIGH/CRITICAL findings block the merge.
# MEDIUM/LOW surface in the run logs but don't fail the job.
#
# Code-scanning SARIF upload is best-effort (continue-on-error):
# it fails on private repos without GitHub Advanced Security. SARIF
# files are also uploaded as workflow artifacts so they're retrievable
# either way.
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run weekly to catch newly-disclosed CVEs even when no code changes.
    # GHSA / NVD update continuously; we'd otherwise only notice on the
    # next PR, which may be weeks away for a stable plugin.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write  # upload SARIF to code scanning
  actions: read

jobs:
  sbom-scan:
    name: SBOM + Grype vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate SBOM
        run: make sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom
          path: dist/sbom/
          retention-days: 30

      # Run Grype directly (rather than via make) so we can emit SARIF
      # for GitHub code scanning. `make sbom-scan` emits table output
      # only — useful for humans, not for the code scanning API.
      - name: Scan SBOM with Grype (SARIF output)
        uses: anchore/scan-action@5ed195cc06065322983cae4bb31e2a751feb86fd # v6.7.0
        id: grype-scan
        with:
          sbom: dist/sbom/server-sbom.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      # Best-effort: requires GitHub Advanced Security on private repos.
      # If code scanning isn't enabled the step fails but the workflow
      # continues. The SARIF still gets uploaded as a workflow artifact
      # below so reviewers can download it manually.
      - name: Upload Grype SARIF to code scanning
        if: always() && steps.grype-scan.outputs.sarif != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v3.30.0
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype

      - name: Upload Grype SARIF as workflow artifact
        if: always() && steps.grype-scan.outputs.sarif != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: grype-sarif
          path: ${{ steps.grype-scan.outputs.sarif }}
          retention-days: 30

  codeql:
    name: CodeQL static analysis (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v3.30.0
        with:
          languages: go
          # Index from repo root so root-package files (main.go,
          # docs_embed.go, runbooks_embed.go) are covered. The Go
          # module is rooted at the repo root — server/ is just a
          # package inside it, not a separate module.

      - name: Autobuild
        uses: github/codeql-action/autobuild@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v3.30.0

      # `upload: failure-only` writes the SARIF to disk and only uploads
      # if the analysis step itself fails — so on a clean run, no upload
      # is attempted (avoids the GHAS gate). The explicit upload step
      # below runs always and is allowed to fail.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v3.30.0
        id: codeql-analyze
        with:
          category: codeql-go
          upload: never
          output: codeql-results

      - name: Upload CodeQL SARIF to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v3.30.0
        with:
          sarif_file: codeql-results
          category: codeql-go

      - name: Upload CodeQL SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: codeql-sarif
          path: codeql-results/
          retention-days: 30
